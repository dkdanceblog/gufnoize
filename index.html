<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ГУФ x НОЙЗ — Pixel Fighter</title>
  <meta property="og:title" content="ГУФ x НОЙЗ — Pixel Fighter" />
  <meta property="og:description" content="Браузерный пиксельный файтинг для GitHub Pages" />
  <meta property="og:image" content="assets/ui/title_screen.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="1280" height="720"></canvas>

    <div id="touch-controls" aria-label="touch controls">
      <div class="touch-pad" aria-label="movement controls">
        <button class="pad-up" data-key="jump">↑</button>
        <button class="pad-left" data-key="left">←</button>
        <button class="pad-down" data-key="crouch">↓</button>
        <button class="pad-right" data-key="right">→</button>
      </div>

      <div class="touch-actions" aria-label="attack controls">
        <button class="act-light" data-key="light">A</button>
        <button class="act-heavy" data-key="heavy">S</button>
        <button class="act-special" data-key="special">D</button>
      </div>
    </div>
  </div>


  <!-- Audio: HTML elements, like the working reference game -->
  <audio id="sfx-hit-light" src="assets/audio/hit_light.mp3" preload="auto"></audio>
  <audio id="sfx-hit-heavy" src="assets/audio/hit_heavy.mp3" preload="auto"></audio>
  <audio id="sfx-special-guf" src="assets/audio/special_guf.mp3" preload="auto"></audio>
  <audio id="sfx-special-noize" src="assets/audio/special_noize.mp3" preload="auto"></audio>
  <audio id="battle-music" src="assets/audio/battle_music.mp3" loop preload="auto"></audio>
  <audio id="sfx-menu-select" src="assets/audio/menu_select.mp3" preload="auto"></audio>

  <script src="game.js"></script>
</body>
</html>
